<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Viewer</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      background:#f3f4f6;
    }

    header{
      background:#111827;
      padding:12px;
      display:flex;
      gap:10px;
    }

    button{
      padding:10px 18px;
      border:none;
      border-radius:20px;
      cursor:pointer;
      background:#e5e7eb;
      font-size:14px;
    }

    button.active{
      background:#2563eb;
      color:white;
    }

    iframe{
      flex:1;
      width:100%;
      border:none;
      background:white;
    }
  </style>
</head>

<body>

  <header>

    <button class="pdf-btn active"
      data-pdf="pdf1.pdf">
      PDF 1
    </button>

    <button class="pdf-btn"
      data-pdf="programs_5_to_9.pdf">
      PDF 2
    </button>

  </header>

  <iframe id="viewer"
    src="ML Lab progs.pdf">
  </iframe>

  <script>

    const buttons = document.querySelectorAll(".pdf-btn");
    const viewer = document.getElementById("viewer");

    buttons.forEach(button => {

      button.addEventListener("click", () => {

        buttons.forEach(btn =>
          btn.classList.remove("active")
        );

        button.classList.add("active");

        viewer.src = button.dataset.pdf;

      });

    });

  </script>

</body>
</html>
